# Overlay dependencies for the shared pretraining env.
# Apply this to ../pretrain/.conda-env
# rather than creating a separate fine-tuning env.
channels:
  - conda-forge
dependencies:
  - pyyaml=6.0.3
  - numpy=2.4.3
  - pillow=12.1.1
  - matplotlib=3.10.8
  - tqdm=4.67.3
  - scipy=1.17.1
  - pip
  - pip:
      - pyiqa==0.1.15.post2
      - timm==1.0.26
      - transformers==5.5.0
      - accelerate==1.13.0
      - safetensors==0.7.0
      - opencv-python==4.13.0.92
      - opencv-python-headless==4.13.0.92
